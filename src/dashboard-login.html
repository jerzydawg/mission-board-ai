<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — MrDelegate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFDF9;
    --surface: #ffffff;
    --border: #E8E3DC;
    --border-strong: #D4CEC4;
    --text: #1a1a1a;
    --text-muted: #6B6B6B;
    --text-dim: #9B9B9B;
    --primary: #F76707;
    --primary-hover: #E8590C;
    --primary-light: rgba(247, 103, 7, 0.08);
    --primary-glow: rgba(247, 103, 7, 0.25);
    --error: #DC2626;
    --warning: #F59F00;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 420px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--primary), transparent);
    opacity: 0.5;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .brand img {
    height: 48px;
    width: 48px;
    border-radius: 12px;
  }

  h1 {
    font-size: 1.375rem;
    font-weight: 800;
    color: var(--text);
    text-align: center;
    margin-bottom: 0.375rem;
    letter-spacing: -0.02em;
  }

  .sub {
    font-size: 0.875rem;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 2rem;
  }

  label {
    display: block;
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 0.75rem 1rem;
    border-radius: 12px;
    font-size: 0.9375rem;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
    margin-bottom: 1.25rem;
  }
  input::placeholder { color: var(--text-dim); }
  input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-light);
    background: var(--surface);
  }

  .btn {
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 0.8rem 1.5rem;
    font-size: 0.9375rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    margin-top: 0.25rem;
  }
  .btn:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px var(--primary-glow);
  }

  .err {
    background: rgba(220, 38, 38, 0.08);
    border: 1px solid rgba(220, 38, 38, 0.2);
    color: var(--error);
    padding: 0.75rem 1rem;
    border-radius: 10px;
    font-size: 0.8125rem;
    margin-bottom: 1.25rem;
    display: none;
  }

  .info {
    background: rgba(245, 159, 0, 0.08);
    border: 1px solid rgba(245, 159, 0, 0.2);
    color: var(--warning);
    padding: 0.75rem 1rem;
    border-radius: 10px;
    font-size: 0.8125rem;
    margin-bottom: 1.25rem;
    display: none;
  }

  .secure-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.375rem;
    margin-top: 1.5rem;
    font-size: 0.6875rem;
    color: var(--text-dim);
  }
  .secure-badge svg {
    width: 12px;
    height: 12px;
    opacity: 0.5;
  }

  @media (max-width: 480px) {
    .card { padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <img src="/logo-icon-premium.svg" alt="MrDelegate" />
  </div>

  <h1>Admin Portal</h1>
  <p class="sub">Founder access only</p>

  <div class="err" id="err"></div>
  <div class="info" id="info"></div>

  <label for="em">Email</label>
  <input type="email" id="em" placeholder="your@email.com" autocomplete="email">

  <label for="pw">Password</label>
  <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password">

  <button type="button" class="btn" id="loginBtn">Sign In →</button>

  <div class="secure-badge">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
    </svg>
    <span>Secured connection</span>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Check for expired session
  if (new URLSearchParams(window.location.search).get('expired') === '1') {
    var info = document.getElementById('info');
    info.textContent = 'Session expired, please log in again.';
    info.style.display = 'block';
  }

  // Login button click
  document.getElementById('loginBtn').addEventListener('click', doLogin);

  // Enter key on password field
  document.getElementById('pw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  // Enter key on email field
  document.getElementById('em').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
});

async function doLogin() {
  var email = document.getElementById('em').value.trim();
  var pw = document.getElementById('pw').value;
  var err = document.getElementById('err');
  var btn = document.getElementById('loginBtn');
  err.style.display = 'none';

  if (!email || !pw) {
    err.textContent = 'Email and password required.';
    err.style.display = 'block';
    return;
  }

  btn.textContent = 'Signing in...';
  btn.disabled = true;

  try {
    var r = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: pw })
    });

    var d = await r.json();

    if (!r.ok) {
      err.textContent = d.error || 'Invalid credentials.';
      err.style.display = 'block';
      btn.textContent = 'Sign In →';
      btn.disabled = false;
      return;
    }

    localStorage.setItem('adminToken', d.token);
    document.cookie = 'adminToken=' + d.token + '; path=/; max-age=604800; SameSite=Lax';
    window.location.href = '/ops/mission-board';
  } catch (e) {
    err.textContent = 'Connection error. Please try again.';
    err.style.display = 'block';
    btn.textContent = 'Sign In →';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
