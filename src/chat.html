<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Agent — MrDelegate</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#050508;--surface:#0d0d14;--panel:#12121a;--border:#1f1f2e;
    --signal:#7c6af7;--signal-dim:rgba(124,106,247,0.13);--signal-glow:rgba(124,106,247,0.35);
    --emerald:#0fe87a;--emerald-dim:rgba(15,232,122,0.1);
    --amber:#f59e0b;--white:#ede8ff;--muted:#6a6a8a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--void);color:var(--white);font-family:'Plus Jakarta Sans',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

  /* Header */
  .header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .agent-info{display:flex;align-items:center;gap:10px;}
  .av{width:36px;height:36px;background:linear-gradient(135deg,var(--signal),#a78bfa);border-radius:10px;display:grid;place-items:center;font-size:16px;box-shadow:0 0 16px var(--signal-glow);flex-shrink:0;}
  .agent-name{font-weight:700;font-size:15px;}
  .agent-status{font-size:11px;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:5px;color:var(--muted);}
  .sdot{width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0;}
  .sdot.live{background:var(--emerald);box-shadow:0 0 6px var(--emerald);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .header-right{display:flex;gap:8px;align-items:center;}
  .dash-link{background:var(--signal-dim);border:1px solid rgba(124,106,247,0.25);color:var(--signal);padding:7px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;}
  .dash-link:hover{background:var(--signal);color:#fff;}

  /* Provisioning */
  #prov-screen{position:absolute;inset:0;background:var(--void);z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto;}
  #prov-screen.gone{display:none;}
  .spin{font-size:48px;margin-bottom:16px;display:inline-block;animation:spin 3s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .prov-title{font-size:22px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px;}
  .prov-sub{color:var(--muted);font-size:13px;margin-bottom:24px;}
  .prog-track{width:100%;max-width:380px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:28px;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--signal),var(--emerald));border-radius:2px;transition:width 0.6s ease;box-shadow:0 0 10px var(--signal-glow);}
  .prov-steps{max-width:340px;width:100%;margin-bottom:24px;}
  .pstep{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .pstep:last-child{border-bottom:none;}
  .pstep-icon{width:20px;text-align:center;font-size:13px;flex-shrink:0;}
  .pstep-text{color:var(--muted);}
  .pstep-text.active{color:var(--signal);font-weight:600;}
  .pstep-text.done{color:var(--white);}
  /* Question card */
  .q-card{max-width:420px;width:100%;background:var(--panel);border:1.5px solid var(--border);border-radius:16px;padding:24px;text-align:left;}
  .q-num{font-size:10px;color:var(--signal);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-weight:700;}
  .q-text{font-size:16px;font-weight:700;margin-bottom:14px;letter-spacing:-0.3px;}
  .q-opts{display:flex;flex-direction:column;gap:7px;}
  .q-opt{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;font-size:14px;cursor:pointer;transition:all 0.15s;}
  .q-opt:hover{border-color:rgba(124,106,247,0.5);}
  .q-opt.sel{border-color:var(--signal);background:var(--signal-dim);color:var(--white);}
  .q-next{margin-top:12px;background:linear-gradient(135deg,var(--signal),#9b87f7);color:#fff;border:none;border-radius:9px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;opacity:0.4;pointer-events:none;transition:all 0.2s;}
  .q-next.on{opacity:1;pointer-events:auto;}

  /* Chat */
  .chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
  .msg{display:flex;gap:9px;max-width:78%;}
  .msg.me{align-self:flex-end;flex-direction:row-reverse;}
  .msg-av{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:13px;flex-shrink:0;background:linear-gradient(135deg,var(--signal),#a78bfa);}
  .msg.me .msg-av{background:var(--surface);border:1px solid var(--border);font-size:11px;font-weight:700;}
  .msg-bub{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;line-height:1.65;}
  .msg.me .msg-bub{background:var(--signal-dim);border-color:rgba(124,106,247,0.25);}
  .typing-dots{display:flex;gap:4px;padding:12px 14px;}
  .typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:tdot 1.2s infinite;}
  .typing-dots span:nth-child(2){animation-delay:0.2s;}
  .typing-dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

  /* Channel banner */
  .ch-banner{background:var(--signal-dim);border-top:1px solid rgba(124,106,247,0.2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px;gap:10px;flex-shrink:0;}
  .ch-banner.gone{display:none;}
  .ch-link{background:var(--signal);color:#fff;border:none;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}

  /* Input */
  .input-row{background:var(--panel);border-top:1px solid var(--border);padding:12px 14px;display:flex;gap:8px;flex-shrink:0;}
  .chat-input{flex:1;background:var(--surface);border:1.5px solid var(--border);color:var(--white);padding:12px 14px;border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:border-color 0.2s;}
  .chat-input:focus{border-color:var(--signal);}
  .chat-input::placeholder{color:var(--muted);}
  .chat-input:disabled{opacity:0.35;cursor:not-allowed;}
  .send-btn{background:linear-gradient(135deg,var(--signal),#9b87f7);border:none;color:#fff;width:46px;height:46px;border-radius:10px;cursor:pointer;font-size:18px;flex-shrink:0;box-shadow:0 2px 12px var(--signal-glow);transition:all 0.2s;}
  .send-btn:hover{transform:translateY(-1px);}
  .send-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none;}

  @media(max-width:480px){
    .msg{max-width:90%;}
    .prov-title{font-size:18px;}
    .q-text{font-size:15px;}
    .spin{font-size:40px;}
    .header .agent-name{font-size:14px;}
  }
</style>
</head>
<body>

<div id="prov-screen">
  <div class="spin">⚡</div>
  <div class="prov-title">Launching your agent</div>
  <div class="prov-sub">Your dedicated VPS is provisioning now</div>
  <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div class="prov-steps">
    <div class="pstep"><div class="pstep-icon" id="si1">⏳</div><div class="pstep-text active" id="st1">Creating your dedicated VPS</div></div>
    <div class="pstep"><div class="pstep-icon" id="si2">○</div><div class="pstep-text" id="st2">Installing OpenClaw</div></div>
    <div class="pstep"><div class="pstep-icon" id="si3">○</div><div class="pstep-text" id="st3">Configuring your agent</div></div>
    <div class="pstep"><div class="pstep-icon" id="si4">○</div><div class="pstep-text" id="st4">Running first startup</div></div>
  </div>
  <div class="q-card" id="qcard">
    <div class="q-num">While we set up — question <span id="qnum">1</span> of 3</div>
    <div class="q-text" id="qtext"></div>
    <div class="q-opts" id="qopts"></div>
    <button class="q-next" id="qnext" onclick="nextQ()">Next →</button>
  </div>
</div>

<div class="header">
  <div class="agent-info">
    <div class="av">✦</div>
    <div>
      <div class="agent-name">Your Agent</div>
      <div class="agent-status"><div class="sdot live" id="sdot"></div><span id="stext">Live</span></div>
    </div>
  </div>
  <div class="header-right">
    <a href="/app" class="dash-link">Dashboard →</a>
  </div>
</div>

<div class="ch-banner gone" id="ch-banner">
  <span>💡 Move to Telegram for 24/7 access — works even when browser is closed</span>
  <button class="ch-link">Connect →</button>
</div>

<div class="chat-area" id="chat-area"></div>

<div class="input-row">
  <input class="chat-input" id="msg-in" type="text" placeholder="Message your agent..." disabled onkeydown="if(event.key==='Enter')sendMsg()">
  <button class="send-btn" id="send-btn" onclick="sendMsg()" disabled>→</button>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const CID=params.get('c')||localStorage.getItem('md_customer_id');
const NAME=params.get('name')||'there';
const CHANNEL=params.get('channel')||'telegram';
if(CID)localStorage.setItem('md_customer_id',CID);

const QS=[
  {q:"What's your biggest time drain right now?",opts:["Email & inbox","Scheduling & meetings","Following up on things","Research & summarizing"]},
  {q:"What do you want handled first?",opts:["Morning briefing","Inbox triage","Calendar management","All of the above"]},
  {q:"How do you prefer updates?",opts:["Brief bullet points","Detailed summaries","Only when urgent","Daily digest"]}
];
let qi=0,answers=[],sel=null,live=false;

function renderQ(){
  const q=QS[qi];
  document.getElementById('qnum').textContent=qi+1;
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('qopts').innerHTML=q.opts.map(o=>`<div class="q-opt" onclick="pickQ(this,'${o}')">${o}</div>`).join('');
  sel=null;document.getElementById('qnext').classList.remove('on');
}
function pickQ(el,v){document.querySelectorAll('.q-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');sel=v;document.getElementById('qnext').classList.add('on');}
function nextQ(){
  if(!sel)return;
  answers.push({q:QS[qi].q,a:sel});qi++;
  if(qi<QS.length){renderQ();}
  else{document.getElementById('qcard').innerHTML='<div style="text-align:center;padding:16px"><div style="font-size:36px;margin-bottom:10px">✓</div><div style="font-weight:700;margin-bottom:4px">Got it — agent is learning your style</div><div style="font-size:13px;color:var(--muted)">Almost ready...</div></div>';}
}

function animateProv(){
  const steps=[{p:25,i:1,n:2},{p:55,i:2,n:3},{p:80,i:3,n:4},{p:100,i:4,n:null}];
  let s=0;
  const iv=setInterval(()=>{
    if(s>=steps.length){clearInterval(iv);return;}
    const step=steps[s];
    document.getElementById('prog').style.width=step.p+'%';
    document.getElementById('si'+step.i).textContent='✓';
    document.getElementById('st'+step.i).className='pstep-text done';
    if(step.n){document.getElementById('si'+step.n).textContent='⏳';document.getElementById('st'+step.n).className='pstep-text active';}
    s++;
  },12000);
}

function goLive(){
  live=true;
  document.getElementById('prov-screen').classList.add('gone');
  document.getElementById('msg-in').disabled=false;
  document.getElementById('send-btn').disabled=false;
  setTimeout(()=>document.getElementById('ch-banner').classList.remove('gone'),30000);
  const fn=NAME!=='there'?NAME.split(' ')[0]:'';
  const hi=fn?`Hey ${fn}! `:'Hey! ';
  const ctx=answers.length?answers[0].a.toLowerCase():'getting things done';
  addMsg('agent',`${hi}I'm live on your dedicated VPS.\n\nI saw you want to tackle **${ctx}** — that's exactly what I'm built for.\n\nTo get started, connect one of these:\n• **Gmail** — inbox triage + smart replies\n• **Google Calendar** — protect your time, morning brief\n• **Notion** — keep docs updated automatically\n\nOr just tell me what you need right now.`);
}

function addMsg(role,text,typing=false){
  const area=document.getElementById('chat-area');
  const d=document.createElement('div');
  d.className='msg'+(role==='user'?' me':'');
  if(typing){
    d.innerHTML=`<div class="msg-av">✦</div><div class="msg-bub"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    area.appendChild(d);area.scrollTop=area.scrollHeight;return d;
  }
  const init=NAME.charAt(0).toUpperCase()||'Y';
  const fmt=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  d.innerHTML=role==='user'
    ?`<div class="msg-av">${init}</div><div class="msg-bub">${fmt}</div>`
    :`<div class="msg-av">✦</div><div class="msg-bub">${fmt}</div>`;
  area.appendChild(d);area.scrollTop=area.scrollHeight;return d;
}

async function sendMsg(){
  const inp=document.getElementById('msg-in');
  const t=inp.value.trim();if(!t||!live)return;
  inp.value='';addMsg('user',t);
  const typ=addMsg('agent','',true);
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({customerId:CID,message:t,answers})});
    const d=await r.json();
    typ.remove();addMsg('agent',d.reply||"Give me a moment — still initializing.");
  }catch(e){typ.remove();addMsg('agent',"Connection hiccup — try again.");}
}

function pollForLive(){
  if(!CID){setTimeout(goLive,6000);return;}
  const iv=setInterval(async()=>{
    try{
      const r=await fetch(`/api/vultr/customer-status?customerId=${CID}`);
      const d=await r.json();
      if(d.status==='active'||d.vpsReady){clearInterval(iv);goLive();}
    }catch(e){}
  },10000);
  setTimeout(()=>{clearInterval(iv);if(!live)goLive();},240000);
}

renderQ();animateProv();pollForLive();
</script>
</body>
</html>
