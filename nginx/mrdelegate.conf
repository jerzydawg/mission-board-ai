server {
    server_name mrdelegate.ai www.mrdelegate.ai;

    # Security headers — must be repeated in any location that has its own add_header
    # (nginx: child location add_header overrides parent, so repeat everywhere)

    location = / {
        root /root/mrdelegate/astro/dist;
        try_files /index.html =404;
        add_header Cache-Control 'no-cache, must-revalidate' always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://js.stripe.com https://hooks.stripe.com; connect-src 'self' https://api.stripe.com https://mrdelegate.ai; object-src 'none'; base-uri 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    location /blog/ {
        root /root/mrdelegate/astro/dist;
        try_files $uri $uri.html $uri/index.html =404;
        add_header Cache-Control 'no-cache, must-revalidate' always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://js.stripe.com https://hooks.stripe.com; connect-src 'self' https://api.stripe.com https://mrdelegate.ai; object-src 'none'; base-uri 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
    location = /blog { return 301 /blog/; }

    location /vs/ {
        root /root/mrdelegate/astro/dist;
        try_files $uri $uri/index.html =404;
        add_header Cache-Control 'no-cache, must-revalidate' always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://js.stripe.com https://hooks.stripe.com; connect-src 'self' https://api.stripe.com https://mrdelegate.ai; object-src 'none'; base-uri 'self';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
    location = /vs { return 301 /vs/startclaw; }

    location /privacy { root /root/mrdelegate/astro/dist; try_files $uri/index.html =404; }
    location /terms   { root /root/mrdelegate/astro/dist; try_files $uri/index.html =404; }
    location /onboarding { return 301 /pricing; }
    location /refund  { root /root/mrdelegate/astro/dist; try_files $uri/index.html =404; }

    location = /sitemap.xml { root /root/mrdelegate/astro/dist; }
    location = /robots.txt  { root /root/mrdelegate/astro/dist; }
    location = /og-image.svg { root /root/mrdelegate/astro/dist; add_header Content-Type image/svg+xml; }

    location /_astro/ {
        root /root/mrdelegate/astro/dist;
        expires 1y;
        add_header Cache-Control 'public, immutable' always;
        add_header X-Content-Type-Options nosniff always;
    }

    location /styles/ {
        root /root/mrdelegate/astro/dist;
        add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
        add_header Pragma no-cache;
        add_header X-Content-Type-Options nosniff always;
    }

    location = /favicon.ico { root /root/mrdelegate/astro/dist; }
    location = /favicon.svg { root /root/mrdelegate/astro/dist; }
    location = /favicon.png { root /root/mrdelegate/astro/dist; }
    location = /logo-nav.png { root /root/mrdelegate/astro/dist; }
    location = /logo.jpg { root /root/mrdelegate/astro/dist; }
    location = /logo.svg { root /root/mrdelegate/astro/dist; }

    # Customer VPS provisioning files
    location /provision/files/ {
        alias /root/mrdelegate/provisioning/customer-files/;
        default_type text/plain;
    }

    # Rate limiting for sensitive endpoints
    location = /api/stripe/checkout {
        limit_req zone=checkout burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests → Node.js platform
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/mrdelegate.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mrdelegate.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Server-level security headers (for locations without their own add_header)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://js.stripe.com https://hooks.stripe.com; connect-src 'self' https://api.stripe.com https://mrdelegate.ai; object-src 'none'; base-uri 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}

server {
    if ($host = www.mrdelegate.ai) { return 301 https://$host$request_uri; }
    if ($host = mrdelegate.ai)     { return 301 https://$host$request_uri; }
    listen 80;
    server_name mrdelegate.ai www.mrdelegate.ai;
    return 404;
}
