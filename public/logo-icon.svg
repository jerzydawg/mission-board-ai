<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#F7931A"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <filter id="glowIcon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(2, 2)">
    <!-- Outer hexagon -->
    <path d="M22 2 L40 12 L40 32 L22 42 L4 32 L4 12 Z" 
          fill="none" stroke="url(#brandGradIcon)" stroke-width="2.5" 
          stroke-linejoin="round" filter="url(#glowIcon)"/>
    
    <!-- Inner diamond -->
    <path d="M22 10 L32 22 L22 34 L12 22 Z" 
          fill="url(#brandGradIcon)" opacity="0.9"/>
    
    <!-- Center dot -->
    <circle cx="22" cy="22" r="4" fill="#fff"/>
    
    <!-- Connection nodes -->
    <circle cx="22" cy="2" r="3" fill="url(#brandGradIcon)"/>
    <circle cx="40" cy="12" r="3" fill="url(#brandGradIcon)"/>
    <circle cx="40" cy="32" r="3" fill="url(#brandGradIcon)"/>
    <circle cx="22" cy="42" r="3" fill="url(#brandGradIcon)"/>
    <circle cx="4" cy="32" r="3" fill="url(#brandGradIcon)"/>
    <circle cx="4" cy="12" r="3" fill="url(#brandGradIcon)"/>
  </g>
</svg>
